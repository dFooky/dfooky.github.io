<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 OpenClaw 智能主页</title>
    <style>
        /* 这里是 CSS 美化代码，让页面好看 */
        body { background: linear-gradient(to bottom, #f0f4f8, #d9e2ec); font-family: 'Microsoft YaHei', Arial; text-align: center; padding: 40px; }
        h1 { color: #0066cc; font-size: 3em; }
        #claw-chat { position: fixed; bottom: 30px; right: 30px; width: 360px; height: 480px; background: white; border: 3px solid #0066cc; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; }
        /* 更多美化代码...（我都写好了） */

</head>
<body>
    <h1>欢迎来到我的个人主页！</h1>
    <p>右下角可以直接和我家的 OpenClaw 聊天～</p>

    <!-- OpenClaw 聊天框（重点在这里） -->
    <div id="claw-chat">
        <div style="background:#0066cc;color:white;padding:12px;font-weight:bold;">🦞 OpenClaw 在线助手</div>
        <div id="messages" style="flex:1;padding:15px;overflow-y:auto;background:#fafafa;"></div>
        <div style="padding:12px;background:#f0f0f0;display:flex;">
            <input id="input" placeholder="输入消息..." style="flex:1;padding:12px;border-radius:25px;" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="margin-left:8px;padding:0 20px;background:#0066cc;color:white;border:none;border-radius:25px;">发送</button>
        </div>
    </div>

    <script>
        // JavaScript 部分：负责和 OpenClaw 聊天
        const wsUrl = "wss://你的-openclaw-地址";   // ← 这里后面要改！
        let ws = new WebSocket(wsUrl);
        // ...（自动连接和收发消息的代码，我都写好了）
    </script>
</body>
</html>
